<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plugin Alliance Launcher - Plugin Editor</title>
    <style>
        :root {
            --bg: #121212;
            --bg-card: #1e1e1e;
            --bg-input: #2a2a2a;
            --text: #ffffff;
            --text-muted: #888888;
            --accent: #0cbff2;
            --accent-hover: #0da8d4;
            --border: #333333;
            --success: #4caf50;
            --warning: #ff9800;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .header {
            background: var(--bg-card);
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: var(--bg-input);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: #3a3a3a;
        }

        .container {
            display: flex;
            height: calc(100vh - 65px);
        }

        .sidebar {
            width: 240px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            padding: 16px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .sidebar h3 {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .filter-group {
            margin-bottom: 24px;
        }

        .filter-item {
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 4px;
            transition: all 0.2s;
        }

        .filter-item:hover {
            background: var(--bg-input);
        }

        .filter-item.active {
            background: var(--accent);
            color: white;
        }

        .filter-item .count {
            float: right;
            color: var(--text-muted);
            font-size: 12px;
        }

        .filter-item.active .count {
            color: rgba(255,255,255,0.7);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .toolbar {
            padding: 12px 24px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .search-box {
            flex: 1;
            max-width: 400px;
            padding: 10px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 14px;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent);
        }

        .stats {
            color: var(--text-muted);
            font-size: 13px;
        }

        .plugin-list {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 16px;
            background: var(--bg-card);
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .page-info {
            color: var(--text-muted);
            font-size: 13px;
            padding: 0 16px;
        }

        .plugin-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }

        .plugin-card.modified {
            border-color: var(--warning);
        }

        .plugin-header {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }

        .plugin-thumbnail {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            object-fit: cover;
            background: var(--bg-input);
        }

        .plugin-info {
            flex: 1;
        }

        .plugin-brand {
            font-size: 12px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .plugin-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .plugin-id {
            font-size: 11px;
            color: var(--text-muted);
            font-family: monospace;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .tags-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .tags-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .tags-header h4 {
            font-size: 14px;
            font-weight: 500;
        }

        .expand-icon {
            color: var(--text-muted);
            font-size: 12px;
        }

        .tags-content {
            display: none;
        }

        .tags-content.expanded {
            display: block;
        }

        .tag-group {
            margin-bottom: 16px;
        }

        .tag-group-title {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            padding: 6px 12px;
            background: var(--bg-input);
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .tag:hover {
            background: #3a3a3a;
        }

        .tag.selected {
            background: var(--accent);
            color: white;
        }

        .notification {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--success);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s;
            z-index: 1000;
        }

        .notification.show {
            opacity: 1;
            transform: translateY(0);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state h3 {
            margin-bottom: 8px;
            color: var(--text);
        }

        .load-section {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            border: 2px dashed var(--border);
            text-align: center;
        }

        .load-section p {
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .file-input {
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Plugin Alliance Launcher - Plugin Editor</h1>
        <div class="header-actions">
            <span class="stats" id="headerStats">0 plugins</span>
            <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">Load JSON</button>
            <button class="btn btn-secondary" onclick="autoAssignAll()">Auto-Assign Tags</button>
            <button class="btn btn-primary" onclick="exportJSON()">Export JSON</button>
        </div>
    </div>

    <input type="file" id="fileInput" class="file-input" accept=".json" onchange="loadJSONFile(event)">

    <div class="container">
        <div class="sidebar">
            <div class="filter-group">
                <h3>Filter by Category</h3>
                <div id="categoryFilters"></div>
            </div>
            <div class="filter-group">
                <h3>Filter by Brand</h3>
                <div id="brandFilters"></div>
            </div>
            <div class="filter-group">
                <h3>Filter by Status</h3>
                <div class="filter-item" data-status="all" onclick="filterByStatus('all')">All</div>
                <div class="filter-item" data-status="incomplete" onclick="filterByStatus('incomplete')">Missing Data</div>
                <div class="filter-item" data-status="modified" onclick="filterByStatus('modified')">Modified</div>
            </div>
        </div>

        <div class="main-content">
            <div class="toolbar">
                <input type="text" class="search-box" id="searchBox" placeholder="Search plugins..." oninput="debouncedSearch()">
                <span class="stats" id="filterStats">Showing 0 plugins</span>
            </div>

            <div class="plugin-list" id="pluginList">
                <div class="load-section">
                    <p>Load plugins.json to get started</p>
                    <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">Load JSON File</button>
                    <p style="margin-top: 12px; font-size: 12px;">Or drag and drop a JSON file here</p>
                </div>
            </div>
        </div>
    </div>

    <div class="notification" id="notification"></div>

    <script>
        // ============ CONSTANTS ============
        const CATEGORIES = [
            'Amp Simulator', 'Channel Strip', 'Compressor', 'Delay', 'Equalizer',
            'Limiter', 'Mastering', 'Meter', 'Reverb', 'Saturator', 'Virtual Instrument',
            'Gate', 'Imager', 'Lo-Fi', 'Modulation', 'Multi-FX', 'Pitch',
            'Restoration', 'Utility'
        ];

        const ERAS = ['1950s', '1960s', '1970s', '1980s', '1990s', '2000s', '2010s', '2020s', 'Modern'];

        const SUBCATEGORIES = {
            'Compressor': ['VCA', 'Opto', 'FET', 'Tube', 'Diode Bridge', 'Multi-band'],
            'Equalizer': ['Parametric', 'Graphic', 'Dynamic', 'Passive', 'Console'],
            'Reverb': ['Hall', 'Plate', 'Room', 'Spring', 'Algorithmic', 'Convolution', 'Spectral'],
            'Delay': ['Tape', 'Digital', 'Analog', 'Multi-Tap', 'Ping Pong'],
            'Amp Simulator': ['Guitar', 'Bass', 'Preamp'],
            'Saturator': ['Tube', 'Tape', 'Transformer', 'Clipper'],
            'Modulation': ['Chorus', 'Flanger', 'Phaser', 'Tremolo', 'Vibrato']
        };

        // ============ STATE ============
        let plugins = [];
        let modifiedPlugins = new Set();
        let currentFilter = { category: 'all', brand: 'all', status: 'all' };
        let currentPage = 1;
        let expandedTags = new Set();
        let searchDebounceTimer = null;
        const PLUGINS_PER_PAGE = 20;

        // ============ INITIALIZATION ============
        function init() {
            updateFilters();
            setupDragAndDrop();
        }

        function setupDragAndDrop() {
            const pluginList = document.getElementById('pluginList');
            pluginList.addEventListener('dragover', (e) => {
                e.preventDefault();
                pluginList.style.borderColor = 'var(--accent)';
            });
            pluginList.addEventListener('dragleave', () => {
                pluginList.style.borderColor = '';
            });
            pluginList.addEventListener('drop', (e) => {
                e.preventDefault();
                pluginList.style.borderColor = '';
                const file = e.dataTransfer.files[0];
                if (file && file.name.endsWith('.json')) {
                    loadFile(file);
                }
            });
        }

        // ============ FILE OPERATIONS ============
        function loadJSONFile(event) {
            const file = event.target.files[0];
            if (file) loadFile(file);
        }

        function loadFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    plugins = data.plugins || [];
                    modifiedPlugins.clear();
                    currentPage = 1;
                    updateFilters();
                    renderPlugins();
                    showNotification(`Loaded ${plugins.length} plugins`);
                } catch (err) {
                    showNotification('Error loading JSON: ' + err.message);
                }
            };
            reader.readAsText(file);
        }

        function exportJSON() {
            const data = { plugins: plugins };
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'plugins.json';
            a.click();
            URL.revokeObjectURL(url);
            showNotification('Exported plugins.json');
        }

        // ============ FILTERING ============
        function updateFilters() {
            // Category filters
            const categories = ['all', ...new Set(plugins.map(p => p.category).filter(c => c))].sort();
            const categoryHtml = categories.map(cat => {
                const count = cat === 'all' ? plugins.length : plugins.filter(p => p.category === cat).length;
                const label = cat === 'all' ? 'All Plugins' : cat;
                return `<div class="filter-item ${currentFilter.category === cat ? 'active' : ''}" onclick="filterByCategory('${cat}')">${label} <span class="count">${count}</span></div>`;
            }).join('');
            document.getElementById('categoryFilters').innerHTML = categoryHtml;

            // Brand filters
            const brands = ['all', ...new Set(plugins.map(p => p.brand).filter(b => b))].sort();
            const brandHtml = brands.slice(0, 20).map(brand => {
                const count = brand === 'all' ? plugins.length : plugins.filter(p => p.brand === brand).length;
                const label = brand === 'all' ? 'All Brands' : brand;
                return `<div class="filter-item ${currentFilter.brand === brand ? 'active' : ''}" onclick="filterByBrand('${brand}')">${label} <span class="count">${count}</span></div>`;
            }).join('');
            document.getElementById('brandFilters').innerHTML = brandHtml;

            // Header stats
            document.getElementById('headerStats').textContent = `${plugins.length} plugins`;
        }

        function filterByCategory(category) {
            currentFilter.category = category;
            currentPage = 1;
            updateFilters();
            renderPlugins();
        }

        function filterByBrand(brand) {
            currentFilter.brand = brand;
            currentPage = 1;
            updateFilters();
            renderPlugins();
        }

        function filterByStatus(status) {
            currentFilter.status = status;
            currentPage = 1;
            document.querySelectorAll('[data-status]').forEach(el => {
                el.classList.toggle('active', el.dataset.status === status);
            });
            renderPlugins();
        }

        function debouncedSearch() {
            if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
            searchDebounceTimer = setTimeout(() => {
                currentPage = 1;
                renderPlugins();
            }, 300);
        }

        function getFilteredPlugins() {
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();

            return plugins.filter(p => {
                if (searchTerm && !p.name.toLowerCase().includes(searchTerm) &&
                    !p.brand.toLowerCase().includes(searchTerm) &&
                    !p.product.toLowerCase().includes(searchTerm)) {
                    return false;
                }
                if (currentFilter.category !== 'all' && p.category !== currentFilter.category) {
                    return false;
                }
                if (currentFilter.brand !== 'all' && p.brand !== currentFilter.brand) {
                    return false;
                }
                if (currentFilter.status === 'incomplete' && p.category && p.tags && p.tags.length > 0) {
                    return false;
                }
                if (currentFilter.status === 'modified' && !modifiedPlugins.has(p.id)) {
                    return false;
                }
                return true;
            });
        }

        // ============ RENDERING ============
        function renderPlugins() {
            const container = document.getElementById('pluginList');
            const filtered = getFilteredPlugins();

            if (filtered.length === 0) {
                container.innerHTML = `<div class="empty-state">
                    <h3>No plugins found</h3>
                    <p>Try adjusting your filters or search term</p>
                </div>`;
                document.getElementById('filterStats').textContent = 'Showing 0 plugins';
                return;
            }

            const totalPages = Math.ceil(filtered.length / PLUGINS_PER_PAGE);
            if (currentPage > totalPages) currentPage = totalPages;

            const startIdx = (currentPage - 1) * PLUGINS_PER_PAGE;
            const endIdx = Math.min(startIdx + PLUGINS_PER_PAGE, filtered.length);
            const pagePlugins = filtered.slice(startIdx, endIdx);

            document.getElementById('filterStats').textContent = `Showing ${startIdx + 1}-${endIdx} of ${filtered.length} plugins`;

            let html = renderPagination(currentPage, totalPages);
            html += pagePlugins.map(plugin => renderPluginCard(plugin)).join('');
            html += renderPagination(currentPage, totalPages);

            container.innerHTML = html;
        }

        function renderPagination(page, totalPages) {
            if (totalPages <= 1) return '';
            return `<div class="pagination">
                <button class="btn btn-secondary" onclick="changePage(1)" ${page === 1 ? 'disabled' : ''}>&laquo;</button>
                <button class="btn btn-secondary" onclick="changePage(${page - 1})" ${page === 1 ? 'disabled' : ''}>&lsaquo;</button>
                <span class="page-info">Page ${page} of ${totalPages}</span>
                <button class="btn btn-secondary" onclick="changePage(${page + 1})" ${page === totalPages ? 'disabled' : ''}>&rsaquo;</button>
                <button class="btn btn-secondary" onclick="changePage(${totalPages})" ${page === totalPages ? 'disabled' : ''}>&raquo;</button>
            </div>`;
        }

        function changePage(page) {
            currentPage = page;
            renderPlugins();
            document.getElementById('pluginList').scrollTop = 0;
        }

        function renderPluginCard(plugin) {
            const idx = plugins.indexOf(plugin);
            const isModified = modifiedPlugins.has(plugin.id);
            const isExpanded = expandedTags.has(idx);
            const tagSummary = plugin.tags && plugin.tags.length > 0
                ? plugin.tags.slice(0, 3).join(', ') + (plugin.tags.length > 3 ? '...' : '')
                : 'None';

            return `
            <div class="plugin-card ${isModified ? 'modified' : ''}">
                <div class="plugin-header">
                    <img class="plugin-thumbnail" src="${plugin.imageUrl || ''}"
                         onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 80 80%22><rect fill=%22%23333%22 width=%2280%22 height=%2280%22/><text x=%2240%22 y=%2245%22 text-anchor=%22middle%22 fill=%22%23666%22 font-size=%2210%22>No Image</text></svg>'">
                    <div class="plugin-info">
                        <div class="plugin-brand">${plugin.brand}</div>
                        <div class="plugin-name">${plugin.product}</div>
                        <div class="plugin-id">${plugin.id}</div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Brand</label>
                        <input type="text" value="${plugin.brand}" oninput="updatePlugin(${idx}, 'brand', this.value)">
                    </div>
                    <div class="form-group">
                        <label>Product Name</label>
                        <input type="text" value="${plugin.product}" oninput="updatePlugin(${idx}, 'product', this.value)">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name (for VST3 matching)</label>
                        <input type="text" value="${plugin.name}" oninput="updatePlugin(${idx}, 'name', this.value)">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select onchange="updatePlugin(${idx}, 'category', this.value)">
                            <option value="">-- Select --</option>
                            ${CATEGORIES.map(c => `<option value="${c}" ${plugin.category === c ? 'selected' : ''}>${c}</option>`).join('')}
                        </select>
                    </div>
                </div>

                <div class="form-group full-width">
                    <label>Description</label>
                    <textarea oninput="updatePlugin(${idx}, 'description', this.value)">${plugin.description || ''}</textarea>
                </div>

                <div class="form-group full-width">
                    <label>Image URL</label>
                    <input type="text" value="${plugin.imageUrl || ''}" oninput="updatePlugin(${idx}, 'imageUrl', this.value)">
                </div>

                <div class="tags-section">
                    <div class="tags-header" onclick="toggleTags(${idx})">
                        <h4>Tags: <span style="color: var(--accent); font-weight: normal; font-size: 12px;">${tagSummary}</span></h4>
                        <span class="expand-icon">${isExpanded ? '▼' : '▶'}</span>
                    </div>
                    <div class="tags-content ${isExpanded ? 'expanded' : ''}" id="tags-${idx}">
                        ${isExpanded ? renderTagSelector(plugin, idx) : ''}
                    </div>
                </div>
            </div>`;
        }

        function renderTagSelector(plugin, idx) {
            const currentTags = plugin.tags || [];
            let html = '';

            // Era tags
            html += `<div class="tag-group">
                <div class="tag-group-title">Era</div>
                <div class="tags-container">
                    ${ERAS.map(era => `<span class="tag ${currentTags.includes(era) ? 'selected' : ''}" onclick="toggleTag(${idx}, '${era}')">${era}</span>`).join('')}
                </div>
            </div>`;

            // Subcategory tags based on current category
            if (plugin.category && SUBCATEGORIES[plugin.category]) {
                html += `<div class="tag-group">
                    <div class="tag-group-title">${plugin.category} Type</div>
                    <div class="tags-container">
                        ${SUBCATEGORIES[plugin.category].map(sub => `<span class="tag ${currentTags.includes(sub) ? 'selected' : ''}" onclick="toggleTag(${idx}, '${sub}')">${sub}</span>`).join('')}
                    </div>
                </div>`;
            }

            return html;
        }

        function toggleTags(idx) {
            if (expandedTags.has(idx)) {
                expandedTags.delete(idx);
            } else {
                expandedTags.add(idx);
            }
            renderPlugins();
        }

        // ============ UPDATE FUNCTIONS ============
        function updatePlugin(idx, field, value) {
            plugins[idx][field] = value;

            // Update name when brand or product changes
            if (field === 'brand' || field === 'product') {
                plugins[idx].name = `${plugins[idx].brand} ${plugins[idx].product}`;
                // Update ID
                plugins[idx].id = plugins[idx].name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/_+/g, '_');
            }

            modifiedPlugins.add(plugins[idx].id);
        }

        function toggleTag(idx, tag) {
            if (!plugins[idx].tags) plugins[idx].tags = [];

            const tagIdx = plugins[idx].tags.indexOf(tag);
            if (tagIdx >= 0) {
                plugins[idx].tags.splice(tagIdx, 1);
            } else {
                plugins[idx].tags.push(tag);
            }

            modifiedPlugins.add(plugins[idx].id);
            renderPlugins();
        }

        // ============ AUTO-ASSIGN ============
        function autoAssignAll() {
            let assigned = 0;
            plugins.forEach((p, idx) => {
                if (autoAssignPlugin(p)) assigned++;
            });
            renderPlugins();
            updateFilters();
            showNotification(`Auto-assigned tags to ${assigned} plugins`);
        }

        function autoAssignPlugin(plugin) {
            const name = plugin.name.toLowerCase();
            const product = plugin.product.toLowerCase();
            let changed = false;

            // Auto-assign category if empty
            if (!plugin.category) {
                if (name.includes('comp') || name.includes('squeeze') || name.includes('opto')) {
                    plugin.category = 'Compressor'; changed = true;
                } else if (name.includes('eq') || name.includes('equalizer') || name.includes('filter')) {
                    plugin.category = 'Equalizer'; changed = true;
                } else if (name.includes('reverb') || name.includes('verb') || name.includes('room') || name.includes('hall')) {
                    plugin.category = 'Reverb'; changed = true;
                } else if (name.includes('delay') || name.includes('echo')) {
                    plugin.category = 'Delay'; changed = true;
                } else if (name.includes('limit')) {
                    plugin.category = 'Limiter'; changed = true;
                } else if (name.includes('amp') || name.includes('guitar') || name.includes('bass') || name.includes('cab')) {
                    plugin.category = 'Amp Simulator'; changed = true;
                } else if (name.includes('saturator') || name.includes('tape') || name.includes('tube') || name.includes('warm')) {
                    plugin.category = 'Saturator'; changed = true;
                } else if (name.includes('channel') || name.includes('console') || name.includes('strip')) {
                    plugin.category = 'Channel Strip'; changed = true;
                } else if (name.includes('master')) {
                    plugin.category = 'Mastering'; changed = true;
                } else if (name.includes('meter') || name.includes('analyzer') || name.includes('metric')) {
                    plugin.category = 'Meter'; changed = true;
                } else if (name.includes('chorus') || name.includes('flanger') || name.includes('phaser') || name.includes('modulation')) {
                    plugin.category = 'Modulation'; changed = true;
                } else if (name.includes('synth') || name.includes('instrument')) {
                    plugin.category = 'Virtual Instrument'; changed = true;
                }
            }

            // Auto-assign era based on plugin characteristics
            if (!plugin.tags) plugin.tags = [];

            // Add more auto-assignment logic as needed

            return changed;
        }

        // ============ UTILITIES ============
        function showNotification(message) {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 3000);
        }

        // Initialize
        init();
    </script>
